{% extends "base.html" %}

{% block content %}
<div class="card auth-card">
  <h1>パスワードリセット</h1>
  <p class="muted">
    登録済みのメールアドレスを入力してください。パスワード再設定用のURLを送信します。
  </p>

  <form method="post">
    <label>メールアドレス</label>
    <input type="email" name="email" required>

    <button type="submit">リセットメールを送信</button>
  </form>

  <p class="muted">
    <a href="{{ url_for('login') }}">ログイン画面へ戻る</a>
  </p>
</div>
{% endblock %}
