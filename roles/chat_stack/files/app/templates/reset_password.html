{% extends "base.html" %}

{% block content %}
<div class="card auth-card">
  <h1>新しいパスワード設定</h1>

  <form method="post">
    <label>新しいパスワード</label>
    <input type="password" name="password" required>

    <label>新しいパスワード確認</label>
    <input type="password" name="password_confirm" required>

    <button type="submit">パスワードを変更</button>
  </form>
</div>
{% endblock %}
