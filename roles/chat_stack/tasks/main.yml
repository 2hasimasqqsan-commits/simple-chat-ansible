---
- name: Create app root directory on app server
  ansible.builtin.file:
    path: "{{ app_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create app directory
  ansible.builtin.file:
    path: "{{ app_root }}/app"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create nginx directory
  ansible.builtin.file:
    path: "{{ app_root }}/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Deploy Flask app files
  ansible.builtin.copy:
    src: app/
    dest: "{{ app_root }}/app/"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Deploy nginx config
  ansible.builtin.copy:
    src: nginx/default.conf
    dest: "{{ app_root }}/nginx/default.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Deploy app env
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ app_root }}/app.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Deploy app docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_root }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Start chat app stack
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ app_root }}"
  changed_when: true
  when: not ansible_check_mode
