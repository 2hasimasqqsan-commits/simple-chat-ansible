---
- name: Create app root directory on data server
  ansible.builtin.file:
    path: "{{ app_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create MariaDB data directory
  ansible.builtin.file:
    path: "{{ app_root }}/mariadb"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create MinIO data directory
  ansible.builtin.file:
    path: "{{ app_root }}/minio"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Deploy data docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_root }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Start data stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_root }}"
  changed_when: true
